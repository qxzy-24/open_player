name: open_player
description: "Open Player — A premium music player for all platforms."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Audio playback
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # Music library query
  on_audio_query: ^2.9.0

  # State management
  provider: ^6.1.2

  # UI enhancements
  google_fonts: ^6.2.1
  audio_video_progress_bar: ^2.0.3

  # Utilities
  rxdart: ^0.28.0
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
